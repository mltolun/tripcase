
[functions.delete-account]
enabled = true
verify_jwt = true
entrypoint = "./functions/delete-account/index.ts"

[functions.trip-planner-agent]
enabled = true
verify_jwt = false
entrypoint = "./functions/trip-planner-agent/index.ts"

[functions.search-flights]
enabled = true
verify_jwt = false
entrypoint = "./functions/search-flights/index.ts"

[functions.sync-flight-durations]
enabled = true
verify_jwt = false
import_map = "./functions/sync-flight-durations/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/sync-flight-durations/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
